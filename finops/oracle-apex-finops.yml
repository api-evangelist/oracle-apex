specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Oracle APEX
providerId: oracle-apex
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Low-Code
  - Database
  - FinOps
  - Cost Management
  - FOCUS
description: 'FOCUS-aligned FinOps for Oracle APEX: APEX is free-with-database, so the meters that matter
  are the Oracle Database / Autonomous Database compute (ECPU or OCPU) and storage that host the APEX
  workspaces.'
sources:
  - https://www.oracle.com/application-development/apex/pricing/
  - https://www.oracle.com/autonomous-database/pricing/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Oracle Corporation
serviceCategory: Application Development / Low-Code
billingModel:
  pricingCategory: Included with Database + Pay-As-You-Go (cloud)
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Adjustment
focusColumns:
  ServiceName: Oracle APEX
  ServiceCategory: Application Development / Low-Code
  ProviderName: Oracle
  PublisherName: Oracle Corporation
  InvoiceIssuerName: Oracle America, Inc.
  BillingCurrency: USD
meters:
  - name: ecpu_hours
    unit: ECPU-hour
    aggregation: sum
    dimensions:
      - autonomous_db
      - workload_type
      - region
  - name: database_storage
    unit: GB-month
    aggregation: sum
    dimensions:
      - autonomous_db
      - region
  - name: backup_storage
    unit: GB-month
    aggregation: sum
    dimensions:
      - autonomous_db
  - name: data_egress
    unit: GB
    aggregation: sum
    dimensions:
      - region
principles:
  - name: Visibility
    description: Use OCI Cost Analysis and Usage Reports to track ECPU and storage consumption per Autonomous
      Database / APEX Service instance; tag instances with workspace/team metadata.
  - name: Allocation
    description: Map APEX workspaces to OCI compartments and tags so each business unit's database consumption
      is allocated cleanly; use OCI tag-based budgets.
  - name: Optimization
    description: Use Always-Free instances for dev/test; consolidate workspaces into Elastic Pools (up
      to ~87% compute discount); enable auto-scaling to pay only for peak ECPUs; bring your own Database
      license (BYOL) where applicable.
  - name: Accountability
    description: Platform team owns the Autonomous Database subscription and monitors monthly OCI invoice
      lines for APEX-hosting instances; line-of-business teams own workspace storage growth.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
