specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Oracle APEX
providerId: oracle-apex
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Low-Code
  - Database
  - Rate Limiting
  - Oracle
notes: APEX itself does not impose request-rate limits — throughput is bounded by the underlying Oracle
  Database / Autonomous Database compute and ORDS configuration. The free apex.oracle.com workspace and
  Always-Free Autonomous instances apply soft fair-use throttling that is not numerically published.
description: APEX inherits its API throughput from ORDS (Oracle REST Data Services) and the underlying
  database. Operators tune ORDS connection pools and database resource manager rules to enforce rate limits.
  Free-tier services (apex.oracle.com, Always-Free Autonomous) apply unpublished fair-use ceilings.
sources:
  - https://docs.oracle.com/en/database/oracle/application-express/
  - https://www.oracle.com/database/technologies/appdev/rest.html
responseCodes:
  throttled: 429
  unavailable: 503
limits:
  - name: APEX hosted workspace (apex.oracle.com)
    scope: workspace
    metric: varies
    limit: fair-use; not numerically published
    notes: Free shared evaluation environment; suitable for prototyping, not production traffic.
  - name: Always-Free Autonomous Database
    scope: instance
    metric: ECPU
    limit: fixed-shape (2 ECPU, 20 GB)
    notes: Throughput bounded by fixed-shape compute.
  - name: Paid Autonomous (APEX Service / ATP)
    scope: instance
    metric: ECPU
    limit: configured by instance shape and auto-scale settings
  - name: Self-hosted Oracle Database
    scope: database
    metric: varies
    limit: bounded by ORDS pool size and DB resource manager
policies:
  - name: ORDS pooling
    description: ORDS controls concurrent DB connections; tune jdbc.MaxLimit and jdbc.InitialLimit to
      shape throughput.
  - name: Resource Manager
    description: Use Oracle Database Resource Manager to cap CPU per consumer group when multi-tenant.
  - name: Fair use on free tiers
    description: apex.oracle.com and Always-Free instances are intended for prototyping; sustained production
      load may be throttled or suspended.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
