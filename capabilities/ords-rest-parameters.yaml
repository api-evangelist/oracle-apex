naftiko: 1.0.0-alpha2
info:
  label: Oracle REST Data Services (ORDS) REST API — Parameters
  description: 'Oracle REST Data Services (ORDS) REST API — Parameters. 5 operations. Lead operation: Get all REST handler
    parameters. Self-contained Naftiko capability covering one Oracle Apex business surface.'
  tags:
  - Oracle Apex
  - Parameters
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ORACLE_APEX_API_KEY: ORACLE_APEX_API_KEY
capability:
  consumes:
  - type: http
    namespace: ords-rest-parameters
    baseUri: https://{host}:{port}/ords/_/db-api/stable
    description: Oracle REST Data Services (ORDS) REST API — Parameters business capability. Self-contained, no shared references.
    resources:
    - name: ords-rest-parameters
      path: /ords/rest/parameters/
      operations:
      - name: listparameters
        method: GET
        description: Get all REST handler parameters
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createparameter
        method: POST
        description: Create a REST handler parameter
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: ords-rest-parameters-id
      path: /ords/rest/parameters/{id}
      operations:
      - name: getparameter
        method: GET
        description: Get a REST handler parameter
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updateparameter
        method: PUT
        description: Update a REST handler parameter
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deleteparameter
        method: DELETE
        description: Delete a REST handler parameter
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.ORACLE_APEX_API_KEY}}'
  exposes:
  - type: rest
    namespace: ords-rest-parameters-rest
    port: 8080
    description: REST adapter for Oracle REST Data Services (ORDS) REST API — Parameters. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/ords/rest/parameters
      name: ords-rest-parameters
      description: REST surface for ords-rest-parameters.
      operations:
      - method: GET
        name: listparameters
        description: Get all REST handler parameters
        call: ords-rest-parameters.listparameters
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createparameter
        description: Create a REST handler parameter
        call: ords-rest-parameters.createparameter
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/ords/rest/parameters/{id}
      name: ords-rest-parameters-id
      description: REST surface for ords-rest-parameters-id.
      operations:
      - method: GET
        name: getparameter
        description: Get a REST handler parameter
        call: ords-rest-parameters.getparameter
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updateparameter
        description: Update a REST handler parameter
        call: ords-rest-parameters.updateparameter
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteparameter
        description: Delete a REST handler parameter
        call: ords-rest-parameters.deleteparameter
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: ords-rest-parameters-mcp
    port: 9090
    transport: http
    description: MCP adapter for Oracle REST Data Services (ORDS) REST API — Parameters. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: get-all-rest-handler-parameters
      description: Get all REST handler parameters
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: ords-rest-parameters.listparameters
      outputParameters:
      - type: object
        mapping: $.
    - name: create-rest-handler-parameter
      description: Create a REST handler parameter
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: ords-rest-parameters.createparameter
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-rest-handler-parameter
      description: Get a REST handler parameter
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: ords-rest-parameters.getparameter
      outputParameters:
      - type: object
        mapping: $.
    - name: update-rest-handler-parameter
      description: Update a REST handler parameter
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: ords-rest-parameters.updateparameter
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-rest-handler-parameter
      description: Delete a REST handler parameter
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: ords-rest-parameters.deleteparameter
      outputParameters:
      - type: object
        mapping: $.
