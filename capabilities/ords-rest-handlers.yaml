        name: listhandlers
        description: Get all REST template handlers
        call: ords-rest-handlers.listhandlers
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createhandler
        description: Create a REST template handler
        call: ords-rest-handlers.createhandler
