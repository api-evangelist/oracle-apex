    resources:
    - name: ords-rest-handlers
      path: /ords/rest/handlers/
      operations:
      - name: listhandlers
        method: GET
        description: Get all REST template handlers
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createhandler
        method: POST
        description: Create a REST template handler
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: ords-rest-handlers-id
