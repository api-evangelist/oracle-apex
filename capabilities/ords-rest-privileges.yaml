      operations:
      - name: listprotectedmodules
        method: GET
        description: Get all protected REST modules
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: ords-rest-privileges
      path: /ords/rest/privileges/
      operations:
      - name: listprivileges
        method: GET
        description: Get all ORDS privileges
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
