      description: REST surface for ords-rest-roles-id-privileges.
      operations:
      - method: GET
        name: listroleprivileges
        description: Get all ORDS privileges for a specific role
        call: ords-rest-roles.listroleprivileges
        outputParameters:
        - type: object
          mapping: $.
