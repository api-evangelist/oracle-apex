        readOnly: false
        destructive: false
        idempotent: false
      call: ords-rest-roles.createrole
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-ords-role
      description: Get an ORDS role
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: ords-rest-roles.getrole
      outputParameters:
      - type: object
        mapping: $.
    - name: update-ords-role
      description: Update an ORDS role
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: ords-rest-roles.updaterole
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-ords-role
