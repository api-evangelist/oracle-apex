specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Oracle APEX
providerId: oracle-apex
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Low-Code
  - Database
  - Development Platform
  - Oracle
description: Oracle APEX (Application Express) is a no-cost feature of every supported edition of Oracle
  Database — there are no per-user, per-app, or per-developer license fees for APEX itself. On Oracle
  Cloud, APEX runs on Autonomous Database (or as the standalone APEX Service); pricing is for the underlying
  ECPU compute and storage rather than for APEX. Always-Free Tier offers up to two APEX Service / Autonomous
  Database instances at no cost, each with ~20 GB storage.
sources:
  - https://apex.oracle.com/
  - https://www.oracle.com/application-development/apex/pricing/
  - https://apex.oracle.com/en/learn/getting-started/pricing/
plans:
  - id: oracle-apex-on-prem-included
    name: Included with Oracle Database
    type: freemium
    description: APEX is included at no additional cost with all supported Oracle Database editions (XE,
      SE2, EE). Unlimited apps, end users, and developers, subject only to underlying database licensing.
    entries:
      - label: APEX runtime
        name: apex_db_included
        type: flat
        metric: install
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Unlimited apps and end users
      - name: Included with all Oracle Database editions
      - name: ORDS (Oracle REST Data Services) included
  - id: oracle-apex-always-free
    name: APEX on Autonomous — Always Free
    type: freemium
    description: Two Always-Free APEX Service / Autonomous Database instances, ~20 GB storage each, never
      expires until upgraded to paid.
    entries:
      - label: Always-Free instance
        name: apex_always_free
        type: flat
        metric: instance-month
        limit: 2
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Up to 2 instances
      - name: ~20 GB storage per instance
      - name: Never expires
  - id: oracle-apex-service-paid
    name: APEX on Autonomous — Pay As You Go
    type: usage-based
    description: APEX Service or APEX on Autonomous Database billed by ECPU compute consumed and storage
      (Autonomous Database pricing applies). No charges per user, per developer, or per app.
    entries:
      - label: ECPU compute
        name: ecpu_hour
        type: metered
        metric: ECPU-hour
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: see https://www.oracle.com/autonomous-database/pricing/
        userMultiplied: false
      - label: Database storage
        name: storage
        type: metered
        metric: GB-month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: see https://www.oracle.com/cloud/price-list/
        userMultiplied: false
    elements:
      - name: Fully managed, auto-scaling
      - name: APEX, ORDS, SQL Developer Web included
      - name: No per-user / per-app fees
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
